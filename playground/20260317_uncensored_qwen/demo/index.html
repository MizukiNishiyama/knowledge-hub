<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uncensored Qwen Demo — Ollama Local Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #333;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #7c6af5;
  --accent-hover: #9280ff;
  --user-bg: #1e2a3a;
  --ai-bg: #1a1a1a;
  --danger: #e05555;
  --success: #4caf7d;
  --code-bg: #111;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "SF Mono", "Fira Code", monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── Header ─── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #7c6af5, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  max-width: 260px;
}

select:focus { outline: none; border-color: var(--accent); }

.badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-uncensored { background: rgba(224,85,85,.2); color: #ff8080; border: 1px solid rgba(224,85,85,.4); }
.badge-censored   { background: rgba(76,175,125,.2); color: #6ee0a8; border: 1px solid rgba(76,175,125,.4); }

.header-actions {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

button {
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  transition: background .15s, opacity .15s;
}

.btn-pull   { background: var(--accent); color: #fff; }
.btn-pull:hover { background: var(--accent-hover); }
.btn-clear  { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn-clear:hover { color: var(--text); }
.btn-sys    { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn-sys:hover { color: var(--text); }
button:disabled { opacity: .4; cursor: not-allowed; }

/* ─── System prompt drawer ─── */
#sys-drawer {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: none;
  flex-shrink: 0;
}
#sys-drawer.open { display: block; }
#sys-drawer label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 6px; }
#sys-prompt {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  resize: vertical;
  min-height: 60px;
}
#sys-prompt:focus { outline: none; border-color: var(--accent); }

/* ─── Status bar ─── */
#status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 20px;
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
}
.status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.err { background: var(--danger); }
.status-dot.spinning { animation: pulse 1s infinite; background: var(--accent); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#speed-display { margin-left: auto; font-family: var(--font-mono); }

/* ─── Messages ─── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}

.message {
  display: flex;
  gap: 14px;
  padding: 12px 20px;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}
.message.user { flex-direction: row-reverse; }
.message.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
.message.assistant .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
}
.avatar.user { background: var(--accent); color: #fff; }
.avatar.ai   { background: linear-gradient(135deg,#7c6af5,#a78bfa); color: #fff; }

.bubble {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.7;
  max-width: calc(100% - 50px);
  word-break: break-word;
}
.bubble pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: var(--font-mono);
  font-size: 12px;
}
.bubble code {
  background: var(--code-bg);
  padding: 2px 5px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.bubble pre code { background: none; padding: 0; }

/* typing indicator */
.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  margin-right: 3px;
  animation: blink 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; margin-right: 0; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* ─── Empty state ─── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  text-align: center;
  gap: 12px;
  padding: 40px;
  pointer-events: none;
}
#empty-state .big-icon { font-size: 48px; }
#empty-state h2 { font-size: 20px; color: var(--text); }
#empty-state p { font-size: 13px; max-width: 360px; line-height: 1.6; }
.examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  pointer-events: all;
  margin-top: 4px;
}
.example-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  color: var(--text-dim);
}
.example-chip:hover { border-color: var(--accent); color: var(--text); }

/* ─── Pull progress ─── */
#pull-progress {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 20px auto;
  max-width: 560px;
  font-size: 13px;
}
#pull-progress.show { display: block; }
#pull-progress .pull-title { font-weight: 600; margin-bottom: 8px; }
#pull-bar-wrap { height: 6px; background: var(--surface2); border-radius: 3px; margin: 8px 0; }
#pull-bar { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width .3s; }
#pull-status { color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); }

/* ─── Input ─── */
#input-area {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 14px 20px;
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 10px 10px 16px;
  transition: border-color .15s;
}
.input-wrap:focus-within { border-color: var(--accent); }

#user-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 160px;
  outline: none;
}
#user-input::placeholder { color: var(--text-dim); }

.btn-send {
  background: var(--accent);
  color: #fff;
  width: 36px; height: 36px;
  border-radius: 8px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}
.btn-send:hover:not(:disabled) { background: var(--accent-hover); }

#input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Uncensored Qwen</div>
  <div class="header-meta">
    <select id="model-select" title="使用するモデルを選択"></select>
    <span class="badge" id="model-badge">—</span>
  </div>
  <div class="header-actions">
    <button class="btn-pull" id="btn-pull" style="display:none">⬇ モデルをPull</button>
    <button class="btn-sys" id="btn-sys" onclick="toggleSys()">⚙ システムプロンプト</button>
    <button class="btn-clear" id="btn-clear" onclick="clearChat()">🗑 クリア</button>
  </div>
</header>

<div id="sys-drawer">
  <label>System Prompt</label>
  <textarea id="sys-prompt" rows="3" placeholder="例: あなたは優秀なコードレビュアーです。厳密に、かつ率直に指摘してください。">あなたは率直で有能なAIアシスタントです。検閲なく、正確かつ誠実に答えてください。</textarea>
</div>

<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Ollama に接続中...</span>
  <span id="speed-display"></span>
</div>

<div id="messages">
  <div id="empty-state">
    <div class="big-icon">🧠</div>
    <h2>ローカル無検閲 LLM</h2>
    <p>データはすべてローカルで処理。クラウドに送信されません。<br>モデルを選択してチャットを始めましょう。</p>
    <div id="pull-progress">
      <div class="pull-title">⬇ モデルをダウンロード中...</div>
      <div id="pull-bar-wrap"><div id="pull-bar"></div></div>
      <div id="pull-status">初期化中...</div>
    </div>
    <div class="examples" id="examples">
      <div class="example-chip" onclick="useExample(this)">Pythonで素数判定関数を書いて</div>
      <div class="example-chip" onclick="useExample(this)">日本語で短編小説のアイデアを5つ</div>
      <div class="example-chip" onclick="useExample(this)">このモデルはどんな仕組みで動いている？</div>
      <div class="example-chip" onclick="useExample(this)">セキュリティ研究者の視点でSQLインジェクションを説明して</div>
      <div class="example-chip" onclick="useExample(this)">機械学習とディープラーニングの違いを教えて</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="メッセージを入力... (Shift+Enter で改行)" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()" title="送信">↑</button>
  </div>
  <div id="input-hint">Ollama ローカル実行 · データはマシン外に出ません</div>
</div>

<script>
const OLLAMA_BASE = "http://localhost:11434";
const TARGET_MODEL = "jaahas/qwen3.5-uncensored:2b";
const UNCENSORED_KEYWORDS = ["uncensored", "abliterated", "ablated", "unfiltered"];

let messages = [];
let isGenerating = false;
let abortCtrl = null;

// ── Init ──────────────────────────────────────────────
async function init() {
  await loadModels();
  checkOllama();
}

async function checkOllama() {
  try {
    const r = await fetch(`${OLLAMA_BASE}/api/tags`);
    if (r.ok) setStatus("ok", `Ollama 接続済み`);
  } catch {
    setStatus("err", "Ollama に接続できません (localhost:11434)");
  }
}

async function loadModels() {
  const sel = document.getElementById("model-select");
  try {
    const r = await fetch(`${OLLAMA_BASE}/api/tags`);
    const data = await r.json();
    const models = data.models || [];

    sel.innerHTML = "";

    // Target model first if available
    const hasTarget = models.some(m => m.name === TARGET_MODEL);

    if (!hasTarget) {
      // Add placeholder option for target model
      const opt = document.createElement("option");
      opt.value = TARGET_MODEL;
      opt.textContent = `${TARGET_MODEL} (未取得)`;
      opt.dataset.uncensored = "true";
      sel.appendChild(opt);
      document.getElementById("btn-pull").style.display = "";
    }

    models.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.name;
      const size = (m.size / 1e9).toFixed(1);
      opt.textContent = `${m.name}  (${size} GB)`;
      const isUncensored = UNCENSORED_KEYWORDS.some(k => m.name.toLowerCase().includes(k));
      opt.dataset.uncensored = isUncensored ? "true" : "false";
      sel.appendChild(opt);
    });

    // Auto-select target or first model
    if (hasTarget) {
      sel.value = TARGET_MODEL;
    }

    updateBadge();
    sel.addEventListener("change", updateBadge);
  } catch {
    const opt = document.createElement("option");
    opt.value = TARGET_MODEL;
    opt.textContent = TARGET_MODEL;
    sel.appendChild(opt);
    setStatus("err", "Ollama に接続できません");
  }
}

function updateBadge() {
  const sel = document.getElementById("model-select");
  const badge = document.getElementById("model-badge");
  const opt = sel.options[sel.selectedIndex];
  const isUncensored = opt && opt.dataset.uncensored === "true";
  badge.className = "badge " + (isUncensored ? "badge-uncensored" : "badge-censored");
  badge.textContent = isUncensored ? "🔓 Uncensored" : "🔒 Censored";
  // Hide pull button if selected model is available
  const notAvailable = opt && opt.textContent.includes("未取得");
  document.getElementById("btn-pull").style.display = notAvailable ? "" : "none";
}

// ── Pull model ────────────────────────────────────────
document.getElementById("btn-pull").addEventListener("click", pullModel);

async function pullModel() {
  const model = document.getElementById("model-select").value;
  const progress = document.getElementById("pull-progress");
  const bar = document.getElementById("pull-bar");
  const status = document.getElementById("pull-status");

  progress.classList.add("show");
  document.getElementById("btn-pull").disabled = true;
  setStatus("spinning", `${model} をダウンロード中...`);

  try {
    const r = await fetch(`${OLLAMA_BASE}/api/pull`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: model, stream: true })
    });

    const reader = r.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split("\n").filter(Boolean);
      for (const line of lines) {
        try {
          const obj = JSON.parse(line);
          if (obj.total && obj.completed) {
            const pct = Math.round((obj.completed / obj.total) * 100);
            bar.style.width = pct + "%";
            const mb = (obj.completed / 1e6).toFixed(0);
            const total = (obj.total / 1e6).toFixed(0);
            status.textContent = `${obj.status}  ${mb} / ${total} MB  (${pct}%)`;
          } else if (obj.status) {
            status.textContent = obj.status;
          }
        } catch {}
      }
    }

    progress.classList.remove("show");
    setStatus("ok", `${model} のダウンロード完了`);
    await loadModels();
  } catch (e) {
    setStatus("err", "ダウンロードに失敗しました: " + e.message);
    document.getElementById("btn-pull").disabled = false;
  }
}

// ── Chat ──────────────────────────────────────────────
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
}

function useExample(el) {
  const input = document.getElementById("user-input");
  input.value = el.textContent;
  autoResize(input);
  input.focus();
}

async function sendMessage() {
  if (isGenerating) {
    abortCtrl?.abort();
    return;
  }

  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;

  const model = document.getElementById("model-select").value;
  const sysPrompt = document.getElementById("sys-prompt").value.trim();

  // Hide empty state
  document.getElementById("empty-state").style.display = "none";

  // Add user message
  messages.push({ role: "user", content: text });
  appendMessage("user", text);
  input.value = "";
  autoResize(input);

  // Build payload
  const payload = {
    model,
    messages: sysPrompt
      ? [{ role: "system", content: sysPrompt }, ...messages]
      : [...messages],
    stream: true,
    options: { temperature: 0.7 }
  };

  // Start AI response
  const aiBubble = appendMessage("assistant", null); // returns bubble element
  setGenerating(true);

  abortCtrl = new AbortController();
  const startTime = Date.now();
  let tokenCount = 0;
  let fullResponse = "";

  try {
    setStatus("spinning", `${model} が生成中...`);
    const r = await fetch(`${OLLAMA_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: abortCtrl.signal
    });

    if (!r.ok) {
      const err = await r.text();
      aiBubble.textContent = `❌ エラー: ${err}`;
      setStatus("err", "生成失敗");
      setGenerating(false);
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    aiBubble.innerHTML = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split("\n").filter(Boolean);
      for (const line of lines) {
        try {
          const obj = JSON.parse(line);
          const chunk = obj.message?.content || "";
          if (chunk) {
            fullResponse += chunk;
            tokenCount++;
            aiBubble.innerHTML = renderMarkdown(fullResponse);
            scrollToBottom();

            const elapsed = (Date.now() - startTime) / 1000;
            const tps = (tokenCount / elapsed).toFixed(1);
            document.getElementById("speed-display").textContent = `${tps} tok/s`;
          }
          if (obj.done) break;
        } catch {}
      }
    }

    messages.push({ role: "assistant", content: fullResponse });
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const finalTps = (tokenCount / parseFloat(elapsed)).toFixed(1);
    setStatus("ok", `完了 — ${tokenCount} トークン / ${elapsed}s / ${finalTps} tok/s`);
    document.getElementById("speed-display").textContent = `${finalTps} tok/s`;

  } catch (e) {
    if (e.name === "AbortError") {
      messages.push({ role: "assistant", content: fullResponse });
      setStatus("ok", "生成を停止しました");
    } else {
      aiBubble.textContent = `❌ エラー: ${e.message}`;
      setStatus("err", e.message);
    }
  } finally {
    setGenerating(false);
  }
}

// ── Rendering ─────────────────────────────────────────
function appendMessage(role, text) {
  const msg = document.createElement("div");
  msg.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role === "user" ? "user" : "ai"}`;
  avatar.textContent = role === "user" ? "You" : "AI";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (text === null) {
    // Typing indicator
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  } else {
    bubble.innerHTML = renderMarkdown(text);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  document.getElementById("messages").appendChild(msg);
  scrollToBottom();
  return bubble;
}

function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = escapeHtml(code.trim());
    return `<pre><code class="language-${lang}">${escaped}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Italic
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
  // Headers
  text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  text = text.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  text = text.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  // Unordered list
  text = text.replace(/^[-*] (.+)$/gm, "<li>$1</li>");
  text = text.replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>");
  // Ordered list
  text = text.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
  // Line breaks
  text = text.replace(/\n\n+/g, "</p><p>");
  text = text.replace(/\n/g, "<br>");
  return `<p>${text}</p>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function scrollToBottom() {
  const msgs = document.getElementById("messages");
  msgs.scrollTop = msgs.scrollHeight;
}

// ── UI helpers ────────────────────────────────────────
function setGenerating(val) {
  isGenerating = val;
  document.getElementById("btn-send").textContent = val ? "■" : "↑";
  document.getElementById("btn-send").title = val ? "停止" : "送信";
  document.getElementById("user-input").placeholder = val ? "生成中... (クリックで停止)" : "メッセージを入力... (Shift+Enter で改行)";
}

function setStatus(type, msg) {
  const dot = document.getElementById("status-dot");
  dot.className = "status-dot " + (type === "spinning" ? "spinning" : type === "ok" ? "ok" : "err");
  document.getElementById("status-text").textContent = msg;
}

function toggleSys() {
  document.getElementById("sys-drawer").classList.toggle("open");
}

function clearChat() {
  messages = [];
  const msgs = document.getElementById("messages");
  msgs.innerHTML = "";
  const empty = document.createElement("div");
  empty.id = "empty-state";
  empty.innerHTML = document.querySelector("#empty-state")?.innerHTML || `
    <div class="big-icon">🧠</div>
    <h2>ローカル無検閲 LLM</h2>
    <p>データはすべてローカルで処理。クラウドに送信されません。</p>
    <div class="examples" id="examples">
      <div class="example-chip" onclick="useExample(this)">Pythonで素数判定関数を書いて</div>
      <div class="example-chip" onclick="useExample(this)">日本語で短編小説のアイデアを5つ</div>
      <div class="example-chip" onclick="useExample(this)">このモデルはどんな仕組みで動いている？</div>
    </div>`;
  // Recreate from scratch
  msgs.innerHTML = `
    <div id="empty-state" style="">
      <div class="big-icon">🧠</div>
      <h2>ローカル無検閲 LLM</h2>
      <p>データはすべてローカルで処理。クラウドに送信されません。<br>モデルを選択してチャットを始めましょう。</p>
      <div class="examples">
        <div class="example-chip" onclick="useExample(this)">Pythonで素数判定関数を書いて</div>
        <div class="example-chip" onclick="useExample(this)">日本語で短編小説のアイデアを5つ</div>
        <div class="example-chip" onclick="useExample(this)">このモデルはどんな仕組みで動いている？</div>
        <div class="example-chip" onclick="useExample(this)">セキュリティ研究者の視点でSQLインジェクションを説明して</div>
        <div class="example-chip" onclick="useExample(this)">機械学習とディープラーニングの違いを教えて</div>
      </div>
    </div>`;
  document.getElementById("speed-display").textContent = "";
  setStatus("ok", "チャットをクリアしました");
}

// ── Boot ──────────────────────────────────────────────
init();
</script>
</body>
</html>
