name: Daily AI Briefing

on:
  schedule:
    # JST 08:00 = UTC 23:00 (前日)
    - cron: "0 23 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install markdown weasyprint

      - name: Set date variable
        run: |
          # GitHub Actions の cron は UTC で動くため、JST (UTC+9) に変換
          echo "BRIEFING_DATE=$(TZ=Asia/Tokyo date +%Y_%m_%d)" >> $GITHUB_ENV
          echo "BRIEFING_DATE_DISPLAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Create output directory
        run: mkdir -p "daily/${{ env.BRIEFING_DATE }}"

      - name: Generate Daily Briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat <<'PROMPT'
          あなたは Daily AI Briefing を生成するリサーチャーです。

          ## 指示
          1. daily/reference.md を読み、セクション構成・フォーマット・品質基準を把握せよ
          2. 各セクションについて Web検索 を実行し、最新情報を収集せよ
          3. GitHub Trending は https://github.com/trending?since=daily を WebFetch で取得せよ
          4. 収集した情報を reference.md のフォーマットに従い daily/$BRIEFING_DATE/summary.md に書き出せ
          5. summary.md を reference.md 記載の Python スクリプトで summary.pdf に変換せよ

          ## 重要ルール
          - 日付は $BRIEFING_DATE_DISPLAY を使用
          - 情報がないセクションは「特記事項なし」と記載（無理に埋めない）
          - すべての情報にソースURLを付記
          - 噂・リークは「未確認」と明記
          PROMPT
          )" \
            --model sonnet \
            --max-turns 30 \
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Bash,Glob,Grep"

      - name: Verify outputs exist
        run: |
          if [ ! -f "daily/${{ env.BRIEFING_DATE }}/summary.md" ]; then
            echo "ERROR: summary.md was not generated"
            exit 1
          fi
          echo "summary.md: $(wc -l < "daily/${{ env.BRIEFING_DATE }}/summary.md") lines"
          if [ -f "daily/${{ env.BRIEFING_DATE }}/summary.pdf" ]; then
            echo "summary.pdf: $(du -h "daily/${{ env.BRIEFING_DATE }}/summary.pdf" | cut -f1)"
          else
            echo "WARNING: summary.pdf was not generated"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "daily/${{ env.BRIEFING_DATE }}/"
          git commit -m "ドキュメント: Daily AI Briefing ${{ env.BRIEFING_DATE_DISPLAY }} を自動生成" || echo "No changes to commit"
          git push
